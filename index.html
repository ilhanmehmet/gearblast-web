<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Blast | Official Developer Site</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000015;
            font-family: 'Segoe UI', sans-serif; color: white;
        }

        /* Galaksi ve Uzay Derinliği */
        .galaxy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000033 0%, #000008 100%);
            z-index: -2;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15; z-index: -1;
        }

        #gearCanvas {
            position: fixed; top: 0; left: 0;
            filter: blur(10px); /* Derinlik için flu */
            opacity: 0.35; z-index: 0;
        }

        .container {
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center; z-index: 10;
        }

        .logo {
            max-width: 270px; width: 70%; height: auto;
            margin-bottom: 20px; filter: drop-shadow(0 0 25px rgba(255,204,0,0.3));
            animation: floatLogo 6s ease-in-out infinite;
        }

        h1 {
            font-size: 3.2rem; margin: 10px 0; color: #ffcc00;
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 0 0 25px rgba(0,0,0,1);
        }

        .status {
            background-color: #28a745; color: white;
            padding: 7px 22px; border-radius: 30px;
            font-weight: bold; text-transform: uppercase;
            font-size: 0.75rem; box-shadow: 0 0 15px rgba(40,167,69,0.4);
        }

        p { font-size: 1.3rem; max-width: 480px; margin: 20px; color: #d0d0d0; }

        .footer { position: absolute; bottom: 30px; font-size: 0.9rem; color: #666; }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="galaxy-bg"></div>
    <div class="stars"></div>
    <canvas id="gearCanvas"></canvas>

    <div class="container">
        <img src="logo_icon.png" alt="Gear Blast" class="logo">
        <div class="status">Official Release</div>
        <h1>Gear Blast</h1>
        <p>Master the ultimate block puzzle challenge.<br><strong>Available on Google Play Store</strong></p>
        <div class="footer">Developed by <strong>İlhan Mehmet Altuntaş</strong></div>
    </div>

    <script>
        const canvas = document.getElementById('gearCanvas');
        const ctx = canvas.getContext('2d');
        let gears = [];
        const colors = ['#ffcc00', '#ff3300', '#00ccff', '#cc00ff', '#33ff00', '#ffffff', '#ff0066', '#00ffcc'];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Gear {
            constructor(i) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Çarklar daha küçük hale getirildi
                this.size = Math.random() * 40 + 20; 
                // İnanılmaz yavaş süzülme (neredeyse duruyor gibi)
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.speedY = (Math.random() - 0.5) * 0.15;
                this.angle = Math.random() * Math.PI * 2;
                // İnanılmaz yavaş dönme hızı
                this.rot = (Math.random() - 0.5) * 0.004; 
                this.color = colors[i % 8];
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                // Tam 8 dişli mekanizması
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.fillRect(this.size * 0.75, -this.size * 0.12, this.size * 0.45, this.size * 0.24);
                }
                ctx.beginPath(); ctx.arc(0, 0, this.size * 0.85, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(0, 0, this.size * 0.4, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.angle += this.rot;
                if(this.x < -100) this.x = canvas.width + 100;
                if(this.x > canvas.width + 100) this.x = -100;
                if(this.y < -100) this.y = canvas.height + 100;
                if(this.y > canvas.height + 100) this.y = -100;
            }
        }

        // Toplam 16 adet küçük çark (Ekran geneline daha homojen dağılım)
        for(let i=0; i<16; i++) gears.push(new Gear(i));

        function anim() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gears.forEach(g => { g.update(); g.draw(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
